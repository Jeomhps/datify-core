name: CLDR Data Pipeline

# Manual, reproducible regeneration. The data only changes when the pinned
# cldr-dates-full version in package.json is bumped, so there is no cron: run
# this workflow after bumping the dependency.
on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pinned CLDR data
        run: npm ci

      - name: Generate per-locale data + index + README coverage
        run: node tools/generate-cldr.mjs

      - name: Create Pull Request with updated data
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PUSH_TOKEN }}
          commit-message: "chore: regenerate CLDR data"
          branch: cldr-auto-update
          title: "chore: regenerate CLDR data"
          body: |
            Automated regeneration of CLDR per-locale data, index, and README
            coverage from the pinned `cldr-dates-full` version in package.json.
          add-paths: |
            src/translations/**
            README.md
