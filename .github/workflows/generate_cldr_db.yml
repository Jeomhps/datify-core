name: CLDR Data Pipeline

# Keeps the CLDR data current automatically. On a schedule (and on demand) it
# fetches the LATEST cldr-dates-full, bumps the exact pin in package.json, and
# regenerates. If anything changed (a new CLDR release, or data differences) it
# opens a PR; if nothing changed, create-pull-request is a no-op. The repo itself
# stays pinned to an exact version, so normal builds/CI remain reproducible — the
# PR is the review gate for every data update.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *" # 06:00 UTC on the 1st of each month

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update cldr-dates-full to the latest exact version
        run: npm install --save-exact cldr-dates-full@latest

      - name: Generate per-locale data + index
        run: node tools/generate-cldr.mjs

      - name: Open PR if the data changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PUSH_TOKEN }}
          commit-message: "chore: update CLDR data to latest cldr-dates-full"
          branch: cldr-auto-update
          title: "chore: update CLDR data to latest cldr-dates-full"
          body: |
            Automated update: bumped `cldr-dates-full` to the latest release and
            regenerated the per-locale data + index. Review the diff before merging.
          add-paths: |
            package.json
            package-lock.json
            src/translations/**
